services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: promocodes
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d promocodes"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/promocodes
      SECRET_KEY: misha-privet
      ACCESS_TOKEN_EXPIRE_MINUTES: 120
      JWT_ALGORITHM: HS256
      MOSCOW_TIMEZONE: Europe/Moscow
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

volumes:
  postgres_data:
